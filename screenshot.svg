<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <!-- ground -->
  <rect x="0" y="0" width="1160" height="560" fill="#14171c"/>

  <!-- ================= header ================= -->
  <rect x="0" y="0" width="1160" height="52" fill="#1c2027"/>
  <rect x="0" y="51" width="1160" height="1" fill="#2d333d"/>
  <text x="20" y="32" font-size="15" font-weight="700" fill="#e8a13a">&#9656; fan-out</text>
  <text x="112" y="32" font-size="11" fill="#646c78">one prompt &#183; many models &#183; keep the good parts</text>

  <!-- header buttons -->
  <g>
    <rect x="690" y="13" width="150" height="26" rx="6" fill="#21262e" stroke="#2d333d"/>
    <text x="704" y="30" font-size="11" fill="#9aa3af">&#10515; keep all columns</text>

    <rect x="848" y="13" width="100" height="26" rx="6" fill="#21262e" stroke="#2d333d"/>
    <circle cx="862" cy="26" r="3.5" fill="#5ca872"/>
    <text x="872" y="30" font-size="11" fill="#9aa3af">streaming</text>

    <rect x="956" y="13" width="92" height="26" rx="6" fill="#21262e" stroke="#2d333d"/>
    <circle cx="970" cy="26" r="3.5" fill="#5ca872"/>
    <text x="980" y="30" font-size="11" fill="#9aa3af">notes/</text>

    <rect x="1056" y="13" width="92" height="26" rx="6" fill="#21262e" stroke="#2d333d"/>
    <text x="1066" y="30" font-size="11" fill="#9aa3af">&#9881; keys</text>
  </g>

  <!-- ================= dock ================= -->
  <rect x="0" y="52" width="1160" height="138" fill="#1c2027"/>
  <rect x="0" y="189" width="1160" height="1" fill="#2d333d"/>

  <!-- prompt box -->
  <rect x="16" y="66" width="1128" height="58" rx="6" fill="#14171c" stroke="#2d333d"/>
  <text x="30" y="91" font-size="13" fill="#e6e9ed">What are the trade-offs between REST and GraphQL</text>
  <text x="30" y="111" font-size="13" fill="#e6e9ed">for a mobile app backend?</text>

  <!-- model toggle pills -->
  <g font-size="11">
    <rect x="16" y="140" width="132" height="22" rx="11" fill="#1d2a2e" stroke="#54b4c4"/>
    <rect x="26" y="148" width="7" height="7" rx="2" fill="#54b4c4"/>
    <text x="39" y="155" fill="#e6e9ed">Claude Opus 4.8</text>

    <rect x="154" y="140" width="86" height="22" rx="11" fill="#1d2a2e" stroke="#54b4c4"/>
    <rect x="164" y="148" width="7" height="7" rx="2" fill="#54b4c4"/>
    <text x="177" y="155" fill="#e6e9ed">GPT-5.5</text>

    <rect x="246" y="140" width="138" height="22" rx="11" fill="#1d2a2e" stroke="#54b4c4"/>
    <rect x="256" y="148" width="7" height="7" rx="2" fill="#54b4c4"/>
    <text x="269" y="155" fill="#e6e9ed">Gemini 3.5 Flash</text>

    <rect x="390" y="140" width="84" height="22" rx="11" fill="#21262e" stroke="#2d333d"/>
    <rect x="400" y="148" width="7" height="7" rx="2" fill="#646c78"/>
    <text x="413" y="155" fill="#9aa3af">Grok 4.3</text>

    <rect x="480" y="140" width="92" height="22" rx="11" fill="#21262e" stroke="#2d333d"/>
    <rect x="490" y="148" width="7" height="7" rx="2" fill="#646c78"/>
    <text x="503" y="155" fill="#9aa3af">DeepSeek</text>
  </g>

  <!-- run button -->
  <rect x="1060" y="137" width="84" height="30" rx="6" fill="#e8a13a"/>
  <text x="1080" y="157" font-size="13" font-weight="700" fill="#1a1205">Run &#9656;</text>

  <!-- ================= board: 3 columns ================= -->
  <rect x="386" y="190" width="1" height="370" fill="#2d333d"/>
  <rect x="773" y="190" width="1" height="370" fill="#2d333d"/>

  <!-- ---- column 1: Claude ---- -->
  <rect x="0" y="190" width="386" height="32" fill="#21262e"/>
  <rect x="16" y="201" width="9" height="9" rx="2" fill="#54b4c4"/>
  <text x="31" y="211" font-size="12" font-weight="600" fill="#e6e9ed">Claude Opus 4.8</text>
  <text x="136" y="211" font-size="10" fill="#646c78">anthropic/claude-opus-4-8</text>
  <text x="296" y="211" font-size="10" fill="#5ca872">4.2s</text>
  <rect x="322" y="199" width="22" height="16" rx="4" fill="#1c2027" stroke="#2d333d"/>
  <text x="328" y="211" font-size="11" fill="#9aa3af">&#10515;</text>
  <rect x="350" y="199" width="22" height="16" rx="4" fill="#1c2027" stroke="#2d333d"/>
  <text x="356" y="211" font-size="11" fill="#9aa3af">&#8635;</text>
  <g font-size="12" fill="#e6e9ed">
    <text x="16" y="244">REST is simpler to cache and reason</text>
    <text x="16" y="262">about — each endpoint maps to a</text>
    <text x="16" y="280">resource and plays well with HTTP</text>
    <rect x="14" y="288" width="338" height="17" fill="#e8a13a"/>
    <text x="16" y="300" fill="#1a1205">caching and CDNs. The cost is over-</text>
    <text x="16" y="318">fetching fields the client won't use.</text>
    <text x="16" y="354" fill="#9aa3af">GraphQL lets the client request only</text>
    <text x="16" y="372" fill="#9aa3af">the fields it needs, which suits</text>
    <text x="16" y="390" fill="#9aa3af">bandwidth-constrained clients...</text>
  </g>

  <!-- ---- column 2: GPT ---- -->
  <rect x="387" y="190" width="386" height="32" fill="#21262e"/>
  <rect x="403" y="201" width="9" height="9" rx="2" fill="#54b4c4"/>
  <text x="418" y="211" font-size="12" font-weight="600" fill="#e6e9ed">GPT-5.5</text>
  <text x="478" y="211" font-size="10" fill="#646c78">openai/gpt-5.5</text>
  <text x="683" y="211" font-size="10" fill="#5ca872">3.1s</text>
  <rect x="709" y="199" width="22" height="16" rx="4" fill="#1c2027" stroke="#2d333d"/>
  <text x="715" y="211" font-size="11" fill="#9aa3af">&#10515;</text>
  <rect x="737" y="199" width="22" height="16" rx="4" fill="#1c2027" stroke="#2d333d"/>
  <text x="743" y="211" font-size="11" fill="#9aa3af">&#8635;</text>
  <g font-size="12" fill="#e6e9ed">
    <text x="403" y="244">Quick comparison:</text>
    <text x="403" y="266">1. REST — easy caching, simple</text>
    <text x="403" y="284">   tooling, risk of over-fetching.</text>
    <text x="403" y="302">2. GraphQL — precise queries, one</text>
    <text x="403" y="320">   endpoint, heavier caching.</text>
    <text x="403" y="356" fill="#9aa3af">On flaky mobile networks, fewer</text>
    <text x="403" y="374" fill="#9aa3af">round-trips often favors GraphQL —</text>
    <text x="403" y="392" fill="#9aa3af">but measure before committing.</text>
  </g>

  <!-- ---- column 3: Gemini ---- -->
  <rect x="774" y="190" width="386" height="32" fill="#21262e"/>
  <rect x="790" y="201" width="9" height="9" rx="2" fill="#54b4c4"/>
  <text x="805" y="211" font-size="12" font-weight="600" fill="#e6e9ed">Gemini 3.5 Flash</text>
  <text x="918" y="211" font-size="10" fill="#646c78">google/gemini-3.5-flash</text>
  <text x="1070" y="211" font-size="10" fill="#5ca872">2.4s</text>
  <rect x="1096" y="199" width="22" height="16" rx="4" fill="#1c2027" stroke="#2d333d"/>
  <text x="1102" y="211" font-size="11" fill="#9aa3af">&#10515;</text>
  <rect x="1124" y="199" width="22" height="16" rx="4" fill="#1c2027" stroke="#2d333d"/>
  <text x="1130" y="211" font-size="11" fill="#9aa3af">&#8635;</text>
  <g font-size="12" fill="#e6e9ed">
    <text x="790" y="244">REST wins on simplicity and HTTP</text>
    <text x="790" y="262">caching. GraphQL wins on payload</text>
    <text x="790" y="280">precision and avoiding multiple</text>
    <text x="790" y="298">round-trips, at the cost of setup.</text>
    <text x="790" y="334" fill="#9aa3af">Pick REST for simple, cache-heavy</text>
    <text x="790" y="352" fill="#9aa3af">APIs; GraphQL for complex, client-</text>
    <text x="790" y="370" fill="#9aa3af">driven data needs.</text>
  </g>
</svg>
